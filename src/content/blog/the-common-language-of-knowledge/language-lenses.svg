<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img">
  <title>ภาษาเป็นเลนส์ของความคิด และ AI เชื่อมเลนส์เหล่านั้นเข้าหากัน</title>
  <desc>แผนภาพแสดงเลนส์ภาษาหลายชุดซ้อนกันรอบ AI ซึ่งทำหน้าที่เป็น common expressive layer ให้ความคิดจากหลายศาสตร์พบกัน</desc>
  <defs>
    <style>
      .title{font-family:Anuphan,-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;font-size:32px;fill:#F8FAFC;font-weight:700}
      .label{font-family:Anuphan,-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;font-size:22px;fill:#E5E7EB;font-weight:700}
      .body{font-family:Anuphan,-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;font-size:18px;fill:#CBD5E1}
      .small{font-family:Anuphan,-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;font-size:15px;fill:#94A3B8}
      .note{font-family:Anuphan,-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;font-size:17px;fill:#A5B4FC}
      .node{fill:#111827;fill-opacity:.66;stroke:#94A3B8;stroke-opacity:.42;stroke-width:1.5}
      .ai{fill:#312E81;fill-opacity:.52;stroke:#A78BFA;stroke-opacity:.9;stroke-width:2.4}
      .lens-cyan{fill:#083344;fill-opacity:.12;stroke:#22D3EE;stroke-opacity:.36;stroke-width:1.8;stroke-dasharray:9 9}
      .lens-violet{fill:#4C1D95;fill-opacity:.12;stroke:#A78BFA;stroke-opacity:.42;stroke-width:1.8;stroke-dasharray:9 9}
      .lens-green{fill:#064E3B;fill-opacity:.1;stroke:#86EFAC;stroke-opacity:.36;stroke-width:1.8;stroke-dasharray:9 9}
      .violet{stroke:#A78BFA;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .cyan{stroke:#22D3EE;stroke-width:2.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
    <marker id="arrow-violet" markerWidth="7" markerHeight="7" refX="7" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 7 3.5 0 7z" fill="#A78BFA"/>
    </marker>
  </defs>

  <text x="700" y="38" text-anchor="middle" class="title">ภาษาเป็นเลนส์ของความคิด</text>
  <text x="700" y="86" text-anchor="middle" class="title">AI เชื่อมเลนส์เหล่านั้นเข้าหากัน</text>

  <ellipse cx="700" cy="390" rx="500" ry="160" class="lens-cyan"/>
  <ellipse cx="700" cy="390" rx="360" ry="205" class="lens-violet" transform="rotate(35 700 390)"/>
  <ellipse cx="700" cy="390" rx="360" ry="205" class="lens-green" transform="rotate(-35 700 390)"/>

  <circle cx="700" cy="390" r="105" class="ai"/>
  <text x="700" y="366" text-anchor="middle" class="title">AI</text>
  <text x="700" y="396" text-anchor="middle" class="label">common</text>
  <text x="700" y="422" text-anchor="middle" class="small">expressive layer</text>
  <text x="700" y="446" text-anchor="middle" class="small">natural · technical · code</text>

  <rect x="140" y="351" width="236" height="78" rx="18" class="node"/>
  <text x="258" y="381" text-anchor="middle" class="label">ภาษาไทย</text>
  <text x="258" y="409" text-anchor="middle" class="small">ความเกรงใจ</text>

  <rect x="1024" y="351" width="236" height="78" rx="18" class="node"/>
  <text x="1142" y="381" text-anchor="middle" class="label">English</text>
  <text x="1142" y="409" text-anchor="middle" class="small">time · tense</text>

  <rect x="560" y="150" width="280" height="78" rx="18" class="node"/>
  <text x="700" y="180" text-anchor="middle" class="label">ภาษาฟิสิกส์</text>
  <text x="700" y="208" text-anchor="middle" class="small">force · energy · field</text>

  <rect x="560" y="540" width="280" height="78" rx="18" class="node"/>
  <text x="700" y="570" text-anchor="middle" class="label">ภาษาเศรษฐศาสตร์</text>
  <text x="700" y="598" text-anchor="middle" class="small">utility · incentives</text>

  <rect x="236" y="195" width="268" height="102" rx="18" class="node"/>
  <text x="370" y="237" text-anchor="middle" class="label">ภาษาโปรแกรม</text>
  <text x="370" y="265" text-anchor="middle" class="small">Python · TypeScript</text>
  <text x="370" y="287" text-anchor="middle" class="small">SQL · Rust</text>

  <rect x="896" y="207" width="268" height="78" rx="18" class="node"/>
  <text x="1030" y="237" text-anchor="middle" class="label">ภาษาชีววิทยา</text>
  <text x="1030" y="265" text-anchor="middle" class="small">gene · cell · protein</text>

  <path d="M376 390H592" class="violet" marker-end="url(#arrow-violet)"/>
  <path d="M1024 390H808" class="violet" marker-end="url(#arrow-violet)"/>
  <path d="M700 228V277" class="violet" marker-end="url(#arrow-violet)"/>
  <path d="M700 540V503" class="violet" marker-end="url(#arrow-violet)"/>
  <path d="M504 297C548 325 572 343 598 364" class="violet" marker-end="url(#arrow-violet)"/>
  <path d="M936 285C880 321 846 343 802 364" class="violet" marker-end="url(#arrow-violet)"/>

  <text x="700" y="680" text-anchor="middle" class="note">AI ไม่ได้ลบภาษาเฉพาะทาง</text>
  <text x="700" y="706" text-anchor="middle" class="note">แต่ทำให้เรายืมเลนส์ของกันและกันได้ง่ายขึ้น</text>
</svg>
