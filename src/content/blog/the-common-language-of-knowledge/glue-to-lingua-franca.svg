<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img">
  <title>จาก CS ในฐานะกาวเชื่อม สู่ AI ในฐานะภาษากลาง</title>
  <desc>แผนภาพเปรียบเทียบซ้ายขวา ระหว่าง CS ที่เชื่อมเครื่องมือข้ามศาสตร์กับ AI ที่สร้างพื้นที่คิดร่วมกันให้หลายศาสตร์</desc>
  <defs>
    <style>
      .title{font-family:Anuphan,-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;font-size:32px;fill:#F8FAFC;font-weight:700}
      .heading{font-family:Anuphan,-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;font-size:25px;fill:#E5E7EB;font-weight:700}
      .label{font-family:Anuphan,-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;font-size:21px;fill:#CBD5E1;font-weight:600}
      .small{font-family:Anuphan,-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;font-size:16px;fill:#94A3B8}
      .note{font-family:Anuphan,-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;font-size:17px;fill:#A5B4FC}
      .panel{fill:#0F172A;fill-opacity:.3;stroke:#64748B;stroke-opacity:.36;stroke-width:1.5}
      .node{fill:#111827;fill-opacity:.64;stroke:#94A3B8;stroke-opacity:.42;stroke-width:1.5}
      .cs{fill:#083344;fill-opacity:.48;stroke:#22D3EE;stroke-opacity:.82;stroke-width:2.1}
      .ai-core{fill:#312E81;fill-opacity:.48;stroke:#A78BFA;stroke-opacity:.9;stroke-width:2.4}
      .shared{fill:#4C1D95;fill-opacity:.14;stroke:#A78BFA;stroke-opacity:.55;stroke-width:2}
      .cyan{stroke:#22D3EE;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .violet{stroke:#A78BFA;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .muted{stroke:#475569;stroke-width:1.4;stroke-dasharray:7 9;fill:none}
    </style>
    <marker id="arrow-cyan" markerWidth="9" markerHeight="9" refX="8.5" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0 9 4.5 0 9z" fill="#22D3EE"/>
    </marker>
    <marker id="arrow-violet" markerWidth="9" markerHeight="9" refX="8.5" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0 9 4.5 0 9z" fill="#A78BFA"/>
    </marker>
  </defs>

  <text x="700" y="38" text-anchor="middle" class="title">“กาวเชื่อม” ส่งเครื่องมือข้ามศาสตร์</text>
  <text x="700" y="86" text-anchor="middle" class="title">“ภาษากลาง” ทำให้ความคิดอยู่ร่วมกัน</text>

  <rect x="70" y="112" width="600" height="570" rx="34" class="panel"/>
  <rect x="730" y="112" width="600" height="570" rx="34" class="panel"/>
  <text x="370" y="162" text-anchor="middle" class="heading">CS เป็นกาวเชื่อม</text>
  <text x="1030" y="162" text-anchor="middle" class="heading">AI เป็นภาษากลาง</text>
  <text x="370" y="196" text-anchor="middle" class="small">เครื่องมือไหลข้ามศาสตร์ แต่กรอบคิดยังแยกกัน</text>
  <text x="1030" y="196" text-anchor="middle" class="small">หลายศาสตร์เข้ามาคิดและถามในพื้นที่เดียวกัน</text>

  <rect x="116" y="242" width="178" height="64" rx="16" class="node"/>
  <text x="205" y="282" text-anchor="middle" class="label">ฟิสิกส์</text>
  <rect x="446" y="242" width="178" height="64" rx="16" class="node"/>
  <text x="535" y="282" text-anchor="middle" class="label">ชีววิทยา</text>
  <rect x="116" y="518" width="178" height="64" rx="16" class="node"/>
  <text x="205" y="558" text-anchor="middle" class="label">เศรษฐศาสตร์</text>
  <rect x="446" y="518" width="178" height="64" rx="16" class="node"/>
  <text x="535" y="558" text-anchor="middle" class="label">ปรัชญา</text>

  <circle cx="370" cy="410" r="86" class="cs"/>
  <text x="370" y="400" text-anchor="middle" class="heading">CS</text>
  <text x="370" y="432" text-anchor="middle" class="small">tools / software</text>
  <path d="M252 306L298 364" class="cyan" marker-end="url(#arrow-cyan)"/>
  <path d="M488 306L442 364" class="cyan" marker-end="url(#arrow-cyan)"/>
  <path d="M252 518L298 456" class="cyan" marker-end="url(#arrow-cyan)"/>
  <path d="M488 518L442 456" class="cyan" marker-end="url(#arrow-cyan)"/>
  <path d="M205 306C205 388 205 452 205 518" class="muted"/>
  <path d="M535 306C535 388 535 452 535 518" class="muted"/>
  <text x="370" y="638" text-anchor="middle" class="note">คนยังคิดด้วยภาษาของสาขาเดิม</text>

  <ellipse cx="1030" cy="404" rx="248" ry="186" class="shared"/>
  <circle cx="1030" cy="404" r="92" class="ai-core"/>
  <text x="1030" y="392" text-anchor="middle" class="title">AI</text>
  <text x="1030" y="424" text-anchor="middle" class="label">shared</text>
  <text x="1030" y="450" text-anchor="middle" class="small">thinking space</text>

  <rect x="812" y="256" width="178" height="64" rx="16" class="node"/>
  <text x="901" y="296" text-anchor="middle" class="label">ฟิสิกส์</text>
  <rect x="1070" y="256" width="178" height="64" rx="16" class="node"/>
  <text x="1159" y="296" text-anchor="middle" class="label">ชีววิทยา</text>
  <rect x="812" y="494" width="178" height="64" rx="16" class="node"/>
  <text x="901" y="534" text-anchor="middle" class="label">เศรษฐศาสตร์</text>
  <rect x="1070" y="494" width="178" height="64" rx="16" class="node"/>
  <text x="1159" y="534" text-anchor="middle" class="label">ปรัชญา</text>

  <path d="M914 320L950 352" class="violet" marker-end="url(#arrow-violet)"/>
  <path d="M1146 320L1110 352" class="violet" marker-end="url(#arrow-violet)"/>
  <path d="M914 494L950 456" class="violet" marker-end="url(#arrow-violet)"/>
  <path d="M1146 494L1110 456" class="violet" marker-end="url(#arrow-violet)"/>

  <text x="1030" y="638" text-anchor="middle" class="note">ความคิดและคำถามย้ายเข้ามาอยู่ในพื้นที่ร่วม</text>
</svg>
