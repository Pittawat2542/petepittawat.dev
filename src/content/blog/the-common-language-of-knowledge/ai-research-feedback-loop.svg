<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img">
  <title>วงจรป้อนกลับที่ AI เร่งงานวิจัย และงานวิจัยทำให้ AI เก่งขึ้น</title>
  <desc>แผนภาพวงจรตามเข็มนาฬิกาแสดง AI capability ช่วยเร่งงานวิจัย ทำให้ทดลองได้เร็วขึ้น เกิดวิธีการและข้อมูลใหม่ แล้วนำไปสู่ AI รุ่นถัดไป</desc>
  <defs>
    <style>
      .title{font-family:Anuphan,-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;font-size:32px;fill:#F8FAFC;font-weight:700}
      .label{font-family:Anuphan,-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;font-size:22px;fill:#E5E7EB;font-weight:700}
      .body{font-family:Anuphan,-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;font-size:18px;fill:#CBD5E1}
      .small{font-family:Anuphan,-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;font-size:15px;fill:#94A3B8}
      .note{font-family:Anuphan,-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;font-size:17px;fill:#A5B4FC}
      .panel{fill:#0F172A;fill-opacity:.3;stroke:#64748B;stroke-opacity:.36;stroke-width:1.5}
      .node{fill:#111827;fill-opacity:.66;stroke:#94A3B8;stroke-opacity:.42;stroke-width:1.5}
      .ai{fill:#312E81;fill-opacity:.52;stroke:#A78BFA;stroke-opacity:.9;stroke-width:2.4}
      .cyan{stroke:#22D3EE;stroke-width:3.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .violet{stroke:#A78BFA;stroke-width:2.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .green{stroke:#86EFAC;stroke-width:2.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .muted{stroke:#475569;stroke-width:1.4;stroke-dasharray:7 9;fill:none}
    </style>
    <marker id="arrow-cyan" markerWidth="7" markerHeight="7" refX="7" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 7 3.5 0 7z" fill="#22D3EE"/>
    </marker>
    <marker id="arrow-violet" markerWidth="7" markerHeight="7" refX="7" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 7 3.5 0 7z" fill="#A78BFA"/>
    </marker>
    <marker id="arrow-green" markerWidth="7" markerHeight="7" refX="7" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 7 3.5 0 7z" fill="#86EFAC"/>
    </marker>
  </defs>

  <text x="700" y="58" text-anchor="middle" class="title">วงจรป้อนกลับ: AI เร่งวิจัย และวิจัยทำให้ AI เก่งขึ้น</text>

  <rect x="108" y="108" width="1184" height="566" rx="34" class="panel"/>
  <circle cx="700" cy="386" r="108" class="ai"/>
  <text x="700" y="364" text-anchor="middle" class="title">AI</text>
  <text x="700" y="398" text-anchor="middle" class="label">capability</text>
  <text x="700" y="428" text-anchor="middle" class="small">models · agents · tools</text>

  <rect x="190" y="170" width="310" height="90" rx="22" class="node"/>
  <text x="345" y="204" text-anchor="middle" class="label">ช่วยอ่าน / เขียน / โค้ด</text>
  <text x="345" y="232" text-anchor="middle" class="small">research acceleration</text>

  <rect x="900" y="170" width="310" height="90" rx="22" class="node"/>
  <text x="1055" y="204" text-anchor="middle" class="label">ทดลองได้เร็วขึ้น</text>
  <text x="1055" y="232" text-anchor="middle" class="small">more iterations</text>

  <rect x="900" y="512" width="310" height="90" rx="22" class="node"/>
  <text x="1055" y="546" text-anchor="middle" class="label">วิธีการ / ข้อมูลใหม่</text>
  <text x="1055" y="574" text-anchor="middle" class="small">new methods · data</text>

  <rect x="190" y="512" width="310" height="90" rx="22" class="node"/>
  <text x="345" y="546" text-anchor="middle" class="label">AI รุ่นถัดไป</text>
  <text x="345" y="574" text-anchor="middle" class="small">better systems</text>

  <path d="M512 214C638 134 762 134 888 214" class="cyan" marker-end="url(#arrow-cyan)"/>
  <path d="M1112 276C1206 354 1206 442 1112 496" class="cyan" marker-end="url(#arrow-cyan)"/>
  <path d="M888 558C762 638 638 638 512 558" class="cyan" marker-end="url(#arrow-cyan)"/>
  <path d="M288 496C194 430 194 326 288 276" class="cyan" marker-end="url(#arrow-cyan)"/>

  <path d="M622 318C570 292 532 274 506 262" class="violet" marker-end="url(#arrow-violet)"/>
  <path d="M778 318C830 292 868 274 894 262" class="violet" marker-end="url(#arrow-violet)"/>
  <path d="M780 454C830 482 866 500 894 510" class="green" marker-end="url(#arrow-green)"/>
  <path d="M620 454C570 482 534 500 506 510" class="green" marker-end="url(#arrow-green)"/>

  <path d="M530 386H592M808 386H870" class="muted"/>
  <text x="700" y="630" text-anchor="middle" class="note">ยิ่ง AI ช่วยเร่งการวิจัยได้มาก</text>
  <text x="700" y="656" text-anchor="middle" class="note">ความสามารถของ AI ก็ยิ่งกลับมาเร่งวงจรนี้อีกครั้ง</text>
</svg>
